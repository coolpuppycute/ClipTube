<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClipTube - Bypass Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* Your original styling maintained for the YouTube look */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;
  --surface:#212121;
  --surface2:#272727;
  --surface3:#333;
  --text:#f1f1f1;
  --text2:#aaa;
  --text3:#666;
  --border:#333;
  --red:#ff0000;
  --red2:#cc0000;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Roboto',sans-serif;font-size:14px}

.header{display:flex;align-items:center;gap:16px;padding:8px 20px;height:56px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;}
.logo{display:flex;align-items:center;gap:6px;font-size:17px;font-weight:700;color:var(--text);white-space:nowrap;cursor:pointer}
.logo svg{width:90px;height:20px}
.search-wrap{flex:1;display:flex;justify-content:center}
.search-form{display:flex;width:100%;max-width:600px}
.search-form input{flex:1;padding:8px 16px;border:1px solid #444;border-right:none;border-radius:40px 0 0 40px;background:#121212;color:var(--text);font-size:15px;outline:none;}
.search-btn{padding:8px 20px;background:var(--surface2);border:1px solid #444;border-left:none;border-radius:0 40px 40px 0;cursor:pointer;color:var(--text2);font-size:18px;}
.avatar{width:32px;height:32px;border-radius:50%;background:#ff6b35;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;}

.chips-wrap{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:190;padding:0 20px}
.chips{display:flex;gap:8px;padding:10px 0;overflow-x:auto}
.chip{padding:6px 14px;border-radius:40px;background:var(--surface2);border:none;font-size:13px;cursor:pointer;color:var(--text);white-space:nowrap;}
.chip.active{background:var(--text);color:var(--bg)}

.layout{display:flex;min-height:calc(100vh - 106px)}
.sidebar{width:240px;min-width:240px;padding:8px 0;background:var(--bg);position:sticky;top:106px;height:calc(100vh - 106px);overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:20px;padding:10px 20px;font-size:13px;cursor:pointer;color:var(--text);border-radius:10px;margin:0 8px;}
.nav-item:hover{background:var(--surface2)}
.nav-item.active{background:var(--surface2);font-weight:500}

.main{flex:1;padding:20px;min-width:0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px}
.video-card{cursor:pointer;border-radius:10px;overflow:hidden;}
.thumb-wrap{position:relative;width:100%;padding-top:56.25%;background:var(--surface2);border-radius:10px;overflow:hidden;}
.thumb-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;}
.duration{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,0.88);color:white;font-size:12px;padding:2px 6px;border-radius:4px;}

.card-info{display:flex;gap:12px;padding:10px 2px}
.ch-av{width:36px;height:36px;min-width:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white}
.card-title{font-size:14px;font-weight:500;line-height:1.4;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-meta{font-size:12px;color:var(--text2);margin-top:4px}

#playerView{display:none}
.player-box{width:100%;padding-top:56.25%;position:relative;background:#000;border-radius:12px;overflow:hidden;}
.player-box video{position:absolute;top:0;left:0;width:100%;height:100%;}
.video-title-big{font-size:20px;font-weight:700;margin:16px 0 8px;color:var(--text)}

.loading{display:flex;justify-content:center;align-items:center;padding:80px;flex-direction:column;gap:12px}
.spinner{width:40px;height:40px;border:3px solid var(--surface3);border-top-color:var(--red);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err-banner{background:#2a0f0f;border:1px solid #5a1f1f;border-radius:10px;padding:14px 18px;color:#ff8a80;margin-bottom:16px}
.note{background:#1a222a;border:1px solid #2e455c;border-radius:10px;padding:10px 16px;font-size:12px;color:#81c7f4;margin-bottom:16px;}
</style>
</head>
<body>

<div class="header">
  <div class="logo" onclick="goHome()">
    <svg viewBox="0 0 90 20" fill="none"><rect width="28" height="20" rx="5" fill="#ff0000"/><polygon points="11,5 21,10 11,15" fill="white"/><text x="33" y="15" font-family="Roboto" font-weight="700" font-size="14" fill="#f1f1f1">ClipTube</text></svg>
  </div>
  <div class="search-wrap"><div class="search-form"><input id="searchInput" type="text" placeholder="Search videos..."><button class="search-btn" onclick="doSearch()">🔍</button></div></div>
  <div class="header-right"><div class="avatar">U</div></div>
</div>

<div class="chips-wrap">
  <div class="chips">
    <button class="chip active" onclick="selectChip(this,'')">All</button>
    <button class="chip" onclick="selectChip(this,'music')">Music</button>
    <button class="chip" onclick="selectChip(this,'gaming')">Gaming</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="nav-item active" onclick="goHome()">🏠 Home</div>
    <div class="nav-item">⚡ Shorts</div>
    <div class="nav-item">📺 Subscriptions</div>
  </div>

  <div class="main">
    <div id="homeView">
      <div id="errEl" style="display:none"></div>
      <div class="grid" id="videoGrid"></div>
      <div id="loadingEl" class="loading" style="display:none"><div class="spinner"></div></div>
    </div>

    <div id="playerView">
      <button onclick="goHome()" style="background:none;border:none;color:var(--text2);cursor:pointer;margin-bottom:10px;">← Back</button>
      <div id="playerArea"></div>
    </div>
  </div>
</div>

<script>
const CORS_PROXY = "https://corsproxy.io/?"; 
const INSTANCES = ['https://yewtu.be', 'https://inv.tux.rs', 'https://invidious.nerdvpn.de'];
let currentIdx = 0;

function fmtN(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return n;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;');}

async function loadVideos() {
  const grid = document.getElementById('videoGrid');
  const loading = document.getElementById('loadingEl');
  const err = document.getElementById('errEl');
  
  loading.style.display = 'flex';
  err.style.display = 'none';

  const q = document.getElementById('searchInput').value.trim();
  const api = `${INSTANCES[currentIdx]}/api/v1/${q ? 'search?q='+encodeURIComponent(q) : 'trending'}`;

  try {
    const res = await fetch(CORS_PROXY + encodeURIComponent(api));
    const data = await res.json();
    
    grid.innerHTML = '';
    data.forEach(v => {
      const card = document.createElement('div');
      card.className = 'video-card';
      card.innerHTML = `
        <div class="thumb-wrap">
          <img src="${v.videoThumbnails?.[0]?.url}" alt="">
          <span class="duration">${Math.floor(v.lengthSeconds/60)}:${(v.lengthSeconds%60).toString().padStart(2,'0')}</span>
        </div>
        <div class="card-info">
          <div class="ch-av" style="background:#444">${v.author[0]}</div>
          <div class="card-text">
            <div class="card-title">${esc(v.title)}</div>
            <div class="card-meta">${esc(v.author)} • ${fmtN(v.viewCount)} views</div>
          </div>
        </div>`;
      card.onclick = () => openVideo(v.videoId);
      grid.appendChild(card);
    });
  } catch (e) {
    currentIdx = (currentIdx + 1) % INSTANCES.length;
    err.style.display = 'block';
    err.innerHTML = "Instance busy. Retrying with backup...";
    setTimeout(loadVideos, 1000);
  }
  loading.style.display = 'none';
}

async function openVideo(id) {
  document.getElementById('homeView').style.display = 'none';
  document.getElementById('playerView').style.display = 'block';
  const area = document.getElementById('playerArea');
  
  area.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  try {
    const res = await fetch(`${CORS_PROXY}${encodeURIComponent(INSTANCES[currentIdx]+'/api/v1/videos/'+id)}`);
    const d = await res.json();
    
    // Crucial: local=true forces the proxy to stream the video instead of YouTube domains
    const stream = `${INSTANCES[currentIdx]}/latest_version?id=${id}&local=true`;

    area.innerHTML = `
      <div class="note">🚀 Bypass Active: Tunneling through ${INSTANCES[currentIdx]}</div>
      <div class="player-box">
        <video controls autoplay><source src="${stream}" type="video/mp4"></video>
      </div>
      <h1 class="video-title-big">${esc(d.title)}</h1>
      <p style="color:var(--text2)">${fmtN(d.viewCount)} views • ${d.author}</p>
    `;
  } catch(e) { area.innerHTML = '<div class="err-banner">Failed to load video. Try another instance.</div>'; }
}

function goHome() {
  document.getElementById('homeView').style.display = 'block';
  document.getElementById('playerView').style.display = 'none';
}

function doSearch() { loadVideos(); }
document.getElementById('searchInput').onkeydown = (e) => e.key === 'Enter' && loadVideos();

loadVideos();
</script>
</body>
</html>
